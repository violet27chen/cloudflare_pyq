name = "moments-api"
main = "worker/src/index.ts"
compatibility_date = "2025-01-15"
compatibility_flags = ["nodejs_compat"]
# Keep the *.workers.dev subdomain live as a fallback alongside the custom domain.
workers_dev = true

# Local dev only. Real secrets go in `wrangler secret put`, never committed.
[vars]
ENVIRONMENT = "development"

# Serve the built frontend (frontend/dist). SPA fallback for client routes.
[assets]
directory = "./frontend/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

# D1 (SQLite) database holding posts / post_images / likes / profile.
[[d1_databases]]
binding = "DB"
database_name = "moments"
database_id = "8ea9cdef-6d06-436e-b45a-599cc928b5ab"
# D1 migrations (idempotent). Apply with:
#   wrangler d1 migrations apply moments --remote
migrations_dir = "./worker/migrations"

# R2 bucket for post images (served same-origin via /img).
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "moments-images"

# 自定义域名（可选）：取消下面注释并改成你的域名即可绑定。
# 前提：该域名的 zone 必须在 Cloudflare 上；部署时会自动建 DNS + TLS。
# [[routes]]
# pattern = "moments.yourdomain.com"
# custom_domain = true

# 首次部署由 scripts/deploy.mjs 自动创建以下密钥（已存在则跳过，不覆盖）：
#   ADMIN_JWT_SECRET   签名短期作者会话 token
#   ADMIN_PASSWORD     后台登录密码（随机生成，部署日志里查看）
