name = "moments-api"
account_id = "60ca3cd180ada95a860a2270fc12b937"
main = "worker/src/index.ts"
compatibility_date = "2025-01-15"
compatibility_flags = ["nodejs_compat"]
# Keep the *.workers.dev subdomain live as a fallback alongside the custom domain.
workers_dev = true

# Local dev only. Real secrets go in `wrangler secret put`, never committed.
[vars]
ENVIRONMENT = "development"

# Serve the built frontend (frontend/dist). SPA fallback for client routes.
[assets]
directory = "./frontend/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

# D1 (SQLite) database holding posts / post_images / likes / profile.
[[d1_databases]]
binding = "DB"
database_name = "moments"
database_id = "8ea9cdef-6d06-436e-b45a-599cc928b5ab"

# R2 bucket for post images (served same-origin via /img).
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "moments-images"

# Custom domain: route moments.qiyuan.icu to this Worker.
# Requires the qiyuan.icu zone to be on Cloudflare; Cloudflare auto-creates
# the DNS record + TLS certificate on deploy.
[[routes]]
pattern = "moments.qiyuan.icu"
custom_domain = true

# Required secrets (set with `wrangler secret put <NAME>`):
#   ADMIN_JWT_SECRET   signs the short-lived author session token
#   ADMIN_PASSWORD     single author password for POST /api/auth/session
